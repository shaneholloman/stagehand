name: Release stagehand/server-v3

on:
  push:
    branches:
      - main
    paths:
      - .changeset/**
      - .github/workflows/stagehand-server-v3-release.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  OAS_PATH: packages/server-v3/openapi.v3.yaml

jobs:
  detect:
    name: Detect server-v3 release (changesets)
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.meta.outputs.release }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          fetch-tags: true

      - uses: ./.github/actions/setup-node-pnpm-turbo
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        with:
          use-prebuilt-artifacts: "false"

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          remote_tags="$(mktemp)"
          git ls-remote --tags --refs origin 'refs/tags/stagehand-server-v3/v*' \
            | awk '{sub("refs/tags/", "", $2); print $2}' \
            > "${remote_tags}"

          latest_tag_file="$(mktemp)"
          REMOTE_TAGS_FILE="${remote_tags}" LATEST_TAG_FILE="${latest_tag_file}" node <<'NODE'
          const fs = require('fs');

          const tags = fs
            .readFileSync(process.env.REMOTE_TAGS_FILE, 'utf8')
            .split('\n')
            .map((line) => line.trim())
            .filter(Boolean);

          const parseTag = (tag) => {
            const match = /^stagehand-server-v3\/v(\d+)\.(\d+)\.(\d+)$/.exec(tag);
            if (!match) {
              return null;
            }
            return match.slice(1).map((part) => Number(part));
          };

          const compareVersions = (left, right) => {
            for (let i = 0; i < 3; i += 1) {
              if (left[i] !== right[i]) {
                return left[i] - right[i];
              }
            }
            return 0;
          };

          let best = null;
          for (const tag of tags) {
            const version = parseTag(tag);
            if (!version) {
              continue;
            }
            if (best === null || compareVersions(version, best.version) > 0) {
              best = { tag, version };
            }
          }

          fs.writeFileSync(process.env.LATEST_TAG_FILE, best?.tag ?? '', 'utf8');
          NODE
          latest_tag="$(cat "${latest_tag_file}")"

          changed_files="$(mktemp)"
          if [ -n "${latest_tag}" ]; then
            git fetch --force origin "refs/tags/${latest_tag}:refs/tags/${latest_tag}"
            git diff --diff-filter=d --name-only "${latest_tag}"..HEAD -- '.changeset/*.md' > "${changed_files}"
          else
            find .changeset -maxdepth 1 -name '*.md' -print | sort > "${changed_files}"
          fi

          LATEST_TAG="${latest_tag}" REMOTE_TAGS_FILE="${remote_tags}" CHANGED_CHANGESET_FILES="${changed_files}" node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const packageName = '@browserbasehq/stagehand-server-v3';
          const latestTag = process.env.LATEST_TAG || '';
          const remoteTags = fs
            .readFileSync(process.env.REMOTE_TAGS_FILE, 'utf8')
            .split('\n')
            .map((line) => line.trim())
            .filter(Boolean);
          const changesetFiles = fs
            .readFileSync(process.env.CHANGED_CHANGESET_FILES, 'utf8')
            .split('\n')
            .map((line) => line.trim())
            .filter(Boolean)
            .filter((file) => path.basename(file) !== 'config.json');

          const releasePriority = { patch: 0, minor: 1, major: 2 };
          const compareVersions = (left, right) => {
            for (let i = 0; i < 3; i += 1) {
              if (left[i] !== right[i]) {
                return left[i] - right[i];
              }
            }
            return 0;
          };
          const parseTag = (tag) => {
            const match = /^stagehand-server-v3\/v(\d+)\.(\d+)\.(\d+)$/.exec(tag);
            if (!match) {
              return null;
            }
            return match.slice(1).map((part) => Number(part));
          };

          let highestRemoteVersion = null;
          for (const tag of remoteTags) {
            const version = parseTag(tag);
            if (!version) {
              continue;
            }
            if (highestRemoteVersion === null || compareVersions(version, highestRemoteVersion) > 0) {
              highestRemoteVersion = version;
            }
          }

          let highestReleaseType = null;

          for (const file of changesetFiles) {
            const content = fs.readFileSync(file, 'utf8');
            const match = /^---\n([\s\S]*?)\n---/m.exec(content);
            if (!match) {
              continue;
            }

            for (const rawLine of match[1].split('\n')) {
              const line = rawLine.trim();
              if (!line || line.startsWith('#')) {
                continue;
              }

              const releaseMatch = /^"([^"]+)"\s*:\s*(patch|minor|major)\s*$/.exec(line);
              if (!releaseMatch) {
                continue;
              }

              const [, releasePackage, releaseType] = releaseMatch;
              if (releasePackage !== packageName) {
                continue;
              }

              if (
                highestReleaseType === null ||
                releasePriority[releaseType] > releasePriority[highestReleaseType]
              ) {
                highestReleaseType = releaseType;
              }
            }
          }

          const shouldRelease = highestReleaseType !== null;
          let version = '';

          if (shouldRelease) {
            if (!latestTag || highestRemoteVersion === null) {
              throw new Error(
                'No existing remote stagehand-server-v3 release tag was found. Refusing to bootstrap from 0.0.0.',
              );
            }

            const parts = [...highestRemoteVersion];
            if (highestReleaseType === 'major') {
              parts[0] += 1;
              parts[1] = 0;
              parts[2] = 0;
            } else if (highestReleaseType === 'minor') {
              parts[1] += 1;
              parts[2] = 0;
            } else {
              parts[2] += 1;
            }

            if (compareVersions(parts, highestRemoteVersion) <= 0) {
              throw new Error(
                `Computed stagehand-server-v3 version ${parts.join('.')} does not advance remote latest ${highestRemoteVersion.join('.')}.`,
              );
            }

            version = parts.join('.');
          }

          const release = shouldRelease ? 'true' : 'false';
          const tag = `stagehand-server-v3/v${version}`;

          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, `release=${release}\n`);
          fs.appendFileSync(out, `version=${version}\n`);
          fs.appendFileSync(out, `tag=${tag}\n`);
          NODE

      - name: Create stagehand/server-v3 tag
        if: steps.meta.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          TARGET_SHA="${{ github.sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Try to fetch the tag if it exists on remote; ignore failure for new tags
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag already exists: ${TAG}"
            exit 0
          fi

          git tag -a "${TAG}" "${TARGET_SHA}" -m "stagehand/server-v3 v${VERSION}"
          git push origin "${TAG}"

  build_binaries:
    name: Build SEA binaries
    needs: detect
    if: needs.detect.outputs.release == 'true'
    uses: ./.github/workflows/stagehand-server-v3-sea-build.yml
    with:
      matrix: |
        [
          {"os":"ubuntu-latest","platform":"linux","arch":"x64","binary_name":"stagehand-server-v3-linux-x64","include_sourcemaps":false},
          {"os":"ubuntu-24.04-arm","platform":"linux","arch":"arm64","binary_name":"stagehand-server-v3-linux-arm64","include_sourcemaps":false},
          {"os":"macos-15","platform":"darwin","arch":"arm64","binary_name":"stagehand-server-v3-darwin-arm64","include_sourcemaps":false},
          {"os":"macos-15-intel","platform":"darwin","arch":"x64","binary_name":"stagehand-server-v3-darwin-x64","include_sourcemaps":false},
          {"os":"windows-latest","platform":"win32","arch":"x64","binary_name":"stagehand-server-v3-win32-x64.exe","include_sourcemaps":false},
          {"os":"windows-11-arm","platform":"win32","arch":"arm64","binary_name":"stagehand-server-v3-win32-arm64.exe","include_sourcemaps":false}
        ]

  release:
    name: Publish GitHub Release
    needs: [detect, build_binaries]
    if: needs.detect.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Prepare release assets directory
        run: mkdir -p release-assets

      - name: Prepare stagehand/server-v3 release assets
        run: |
          set -euo pipefail
          cp "${{ env.OAS_PATH }}" "release-assets/openapi.v3.stagehand-server-v3-${{ needs.detect.outputs.version }}.yaml"

      - name: Download SEA binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: stagehand-server-v3-*
          path: .
          merge-multiple: true

      - name: Collect SEA binaries
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in packages/server-v3/dist/sea/stagehand-server-v3-*; do
            cp "$f" release-assets/
          done

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          # Only checksum binaries (exclude openapi yaml). Avoid failing if no matches.
          shopt -s nullglob
          files=(stagehand-server-v3-*)
          bins=()
          for f in "${files[@]}"; do
            [[ "$f" == *openapi* ]] && continue
            [[ -f "$f" ]] && bins+=("$f")
          done
          : > checksums.sha256
          if [ "${#bins[@]}" -gt 0 ]; then
            shasum -a 256 "${bins[@]}" > checksums.sha256
          fi

      - name: Publish stagehand/server-v3 GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: stagehand/server-v3 v${{ needs.detect.outputs.version }}
          generate_release_notes: true
          files: |
            release-assets/openapi.v3.stagehand-server-v3-${{ needs.detect.outputs.version }}.yaml
            release-assets/stagehand-server-v3-*
            release-assets/checksums.sha256
