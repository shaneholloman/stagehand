openapi: "3.1.0"
info:
  title: Stagehand API v4
  version: "4.0.0"
  description: >-
    Stagehand SDK for AI browser automation [ALPHA]. This API allows clients to

    execute browser automation tasks remotely on the Browserbase cloud.

    Create a browser session with /browsersession, then use that id with page
    routes.

    Responses are streamed using Server-Sent Events (SSE) when the

    `x-stream-response: true` header is provided.


    This SDK is currently ALPHA software and is not production ready!

    Please try it and give us your feedback, stay tuned for upcoming release
    announcements!
  contact:
    name: Browserbase
    url: https://browserbase.com
components:
  securitySchemes:
    BrowserbaseApiKey:
      type: apiKey
      in: header
      name: x-bb-api-key
      description: Browserbase API key for authentication
    BrowserbaseProjectId:
      type: apiKey
      in: header
      name: x-bb-project-id
      description: Deprecated. Browserbase API keys are now project-scoped, so this
        header is no longer required.
    ModelApiKey:
      type: apiKey
      in: header
      name: x-model-api-key
      description: API key for the AI model provider (OpenAI, Anthropic, etc.)
  links:
    SessionAct:
      operationId: SessionAct
      parameters:
        id: $response.body#/data/sessionId
      description: Perform an action on the session
    SessionExtract:
      operationId: SessionExtract
      parameters:
        id: $response.body#/data/sessionId
      description: Extract data from the session
    SessionObserve:
      operationId: SessionObserve
      parameters:
        id: $response.body#/data/sessionId
      description: Observe available actions on the session
    SessionNavigate:
      operationId: SessionNavigate
      parameters:
        id: $response.body#/data/sessionId
      description: Navigate to a URL in the session
    SessionAgentExecute:
      operationId: SessionAgentExecute
      parameters:
        id: $response.body#/data/sessionId
      description: Execute an agent on the session
    SessionReplay:
      operationId: SessionReplay
      parameters:
        id: $response.body#/data/sessionId
      description: Replay session metrics
    SessionEnd:
      operationId: SessionEnd
      parameters:
        id: $response.body#/data/sessionId
      description: End the session and release resources
  schemas:
    BrowserSessionLocalCreateRequest:
      type: object
      properties:
        domSettleTimeoutMs:
          type: number
        verbose:
          anyOf:
            - type: number
              const: 0
            - type: number
              const: 1
            - type: number
              const: 2
        selfHeal:
          type: boolean
        waitForCaptchaSolves:
          type: boolean
        experimental:
          type: boolean
        actTimeoutMs:
          type: number
        llmId:
          $ref: "#/components/schemas/LLMId"
        actLlmId:
          $ref: "#/components/schemas/LLMId"
        observeLlmId:
          $ref: "#/components/schemas/LLMId"
        extractLlmId:
          $ref: "#/components/schemas/LLMId"
        env:
          type: string
          const: LOCAL
        cdpUrl:
          type: string
        localBrowserLaunchOptions:
          $ref: "#/components/schemas/LocalBrowserLaunchOptions"
      required:
        - env
      additionalProperties: false
    BrowserSessionBrowserbaseCreateRequest:
      type: object
      properties:
        domSettleTimeoutMs:
          type: number
        verbose:
          anyOf:
            - type: number
              const: 0
            - type: number
              const: 1
            - type: number
              const: 2
        selfHeal:
          type: boolean
        waitForCaptchaSolves:
          type: boolean
        experimental:
          type: boolean
        actTimeoutMs:
          type: number
        llmId:
          $ref: "#/components/schemas/LLMId"
        actLlmId:
          $ref: "#/components/schemas/LLMId"
        observeLlmId:
          $ref: "#/components/schemas/LLMId"
        extractLlmId:
          $ref: "#/components/schemas/LLMId"
        env:
          type: string
          const: BROWSERBASE
        browserbaseSessionId:
          type: string
        browserbaseSessionCreateParams:
          $ref: "#/components/schemas/BrowserbaseSessionCreateParams"
      required:
        - env
      additionalProperties: false
    BrowserbaseBrowserSettings:
      type: object
      properties:
        advancedStealth:
          type: boolean
        blockAds:
          type: boolean
        captchaImageSelector:
          type: string
        captchaInputSelector:
          type: string
        context:
          $ref: "#/components/schemas/BrowserbaseContext"
        extensionId:
          type: string
        fingerprint:
          $ref: "#/components/schemas/BrowserbaseFingerprint"
        logSession:
          type: boolean
        os:
          type: string
          enum:
            - windows
            - mac
            - linux
            - mobile
            - tablet
        recordSession:
          type: boolean
        solveCaptchas:
          type: boolean
        verified:
          type: boolean
        viewport:
          $ref: "#/components/schemas/BrowserbaseViewport"
    BrowserbaseContext:
      type: object
      properties:
        id:
          type: string
        persist:
          type: boolean
      required:
        - id
    BrowserbaseFingerprint:
      type: object
      properties:
        browsers:
          type: array
          items:
            type: string
            enum:
              - chrome
              - edge
              - firefox
              - safari
        devices:
          type: array
          items:
            type: string
            enum:
              - desktop
              - mobile
        httpVersion:
          type: string
          enum:
            - "1"
            - "2"
        locales:
          type: array
          items:
            type: string
        operatingSystems:
          type: array
          items:
            type: string
            enum:
              - android
              - ios
              - linux
              - macos
              - windows
        screen:
          $ref: "#/components/schemas/BrowserbaseFingerprintScreen"
    BrowserbaseFingerprintScreen:
      type: object
      properties:
        maxHeight:
          type: number
        maxWidth:
          type: number
        minHeight:
          type: number
        minWidth:
          type: number
    BrowserbaseViewport:
      type: object
      properties:
        width:
          type: number
        height:
          type: number
    ProxyConfig:
      oneOf:
        - $ref: "#/components/schemas/BrowserbaseProxyConfig"
        - $ref: "#/components/schemas/ExternalProxyConfig"
      type: object
      discriminator:
        propertyName: type
        mapping:
          browserbase: "#/components/schemas/BrowserbaseProxyConfig"
          external: "#/components/schemas/ExternalProxyConfig"
    BrowserbaseProxyConfig:
      type: object
      properties:
        type:
          type: string
          const: browserbase
        domainPattern:
          type: string
        geolocation:
          $ref: "#/components/schemas/BrowserbaseProxyGeolocation"
      required:
        - type
    BrowserbaseProxyGeolocation:
      type: object
      properties:
        country:
          type: string
        city:
          type: string
        state:
          type: string
      required:
        - country
    ExternalProxyConfig:
      type: object
      properties:
        type:
          type: string
          const: external
        server:
          type: string
        domainPattern:
          type: string
        username:
          type: string
        password:
          type: string
      required:
        - type
        - server
    BrowserbaseRegion:
      type: string
      enum:
        - us-west-2
        - us-east-1
        - eu-central-1
        - ap-southeast-1
    SessionHeaders:
      type: object
      properties:
        x-stream-response:
          description: Whether to stream the response via SSE
          example: "true"
          type: string
          enum:
            - "true"
            - "false"
    BrowserSessionAddInitScriptResult:
      type: object
      properties:
        added:
          type: boolean
      required:
        - added
      additionalProperties: false
    BrowserSessionSetExtraHTTPHeadersResult:
      type: object
      properties:
        headers:
          $ref: "#/components/schemas/PageHeaders"
      required:
        - headers
      additionalProperties: false
    BrowserSessionPagesResult:
      type: object
      properties:
        pages:
          type: array
          items:
            $ref: "#/components/schemas/BrowserSessionPage"
      required:
        - pages
      additionalProperties: false
    BrowserSessionOptionalPageResult:
      type: object
      properties:
        page:
          anyOf:
            - $ref: "#/components/schemas/BrowserSessionPage"
            - type: "null"
      required:
        - page
      additionalProperties: false
    BrowserSessionPageResult:
      type: object
      properties:
        page:
          $ref: "#/components/schemas/BrowserSessionPage"
      required:
        - page
      additionalProperties: false
    BrowserSessionFrameTreeResult:
      type: object
      properties:
        frameTree: {}
      required:
        - frameTree
      additionalProperties: false
    BrowserSessionCookiesResult:
      type: object
      properties:
        cookies:
          type: array
          items:
            $ref: "#/components/schemas/BrowserSessionCookie"
      required:
        - cookies
      additionalProperties: false
    BrowserSessionAddCookiesResult:
      type: object
      properties:
        added:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - added
      additionalProperties: false
    BrowserSessionClearCookiesResult:
      type: object
      properties:
        cleared:
          type: boolean
      required:
        - cleared
      additionalProperties: false
    BrowserSessionConnectURLResult:
      type: object
      properties:
        connectURL:
          type: string
      required:
        - connectURL
      additionalProperties: false
    BrowserSessionConfiguredViewportResult:
      $ref: "#/components/schemas/BrowserSessionViewport"
    BrowserSessionBrowserbaseSessionIDResult:
      type: object
      properties:
        browserbaseSessionID:
          anyOf:
            - type: string
            - type: "null"
      required:
        - browserbaseSessionID
      additionalProperties: false
    BrowserSessionBrowserbaseSessionURLResult:
      type: object
      properties:
        browserbaseSessionURL:
          anyOf:
            - type: string
            - type: "null"
      required:
        - browserbaseSessionURL
      additionalProperties: false
    BrowserSessionBrowserbaseDebugURLResult:
      type: object
      properties:
        browserbaseDebugURL:
          anyOf:
            - type: string
            - type: "null"
      required:
        - browserbaseDebugURL
      additionalProperties: false
    BrowserSessionIsBrowserbaseResult:
      type: object
      properties:
        isBrowserbase:
          type: boolean
      required:
        - isBrowserbase
      additionalProperties: false
    BrowserSessionIsAdvancedStealthResult:
      type: object
      properties:
        isAdvancedStealth:
          type: boolean
      required:
        - isAdvancedStealth
      additionalProperties: false
    BrowserSessionSetViewportSizeResult:
      $ref: "#/components/schemas/BrowserSessionViewport"
    BrowserSessionCloseResult:
      type: object
      properties:
        closed:
          type: boolean
      required:
        - closed
      additionalProperties: false
    PageClickResult:
      type: object
      properties:
        selector:
          $ref: "#/components/schemas/ResultSelector"
      required:
        - selector
      additionalProperties: false
    PageHoverResult:
      type: object
      properties:
        selector:
          $ref: "#/components/schemas/ResultSelector"
      required:
        - selector
      additionalProperties: false
    PageScrollResult:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
      required:
        - x
        - y
      additionalProperties: false
    PageDragAndDropResult:
      type: object
      properties:
        startSelector:
          $ref: "#/components/schemas/ResultSelector"
        endSelector:
          $ref: "#/components/schemas/ResultSelector"
      required:
        - startSelector
        - endSelector
      additionalProperties: false
    PageTypeResult:
      type: object
      properties:
        text:
          type: string
      required:
        - text
      additionalProperties: false
    PageKeyPressResult:
      type: object
      properties:
        key:
          type: string
      required:
        - key
      additionalProperties: false
    PageEnableCursorOverlayResult:
      type: object
      properties:
        enabled:
          type: boolean
      required:
        - enabled
      additionalProperties: false
    PageAddInitScriptResult:
      type: object
      properties:
        added:
          type: boolean
      required:
        - added
      additionalProperties: false
    PageNavigationResult:
      type: object
      properties:
        url:
          type: string
        response:
          anyOf:
            - type: object
              properties:
                url:
                  type: string
                status:
                  type: integer
                  minimum: -9007199254740991
                  maximum: 9007199254740991
                statusText:
                  type: string
                ok:
                  type: boolean
                headers:
                  $ref: "#/components/schemas/PageHeaders"
              required:
                - url
                - status
                - statusText
                - ok
                - headers
              additionalProperties: false
            - type: "null"
      required:
        - url
        - response
      additionalProperties: false
    PageTargetIdResult:
      type: object
      properties:
        targetId:
          $ref: "#/components/schemas/PageId"
      required:
        - targetId
      additionalProperties: false
    PageMainFrameIdResult:
      type: object
      properties:
        mainFrameId:
          $ref: "#/components/schemas/FrameId"
      required:
        - mainFrameId
      additionalProperties: false
    PageFrameTreeResult:
      type: object
      properties:
        frameTree: {}
      required:
        - frameTree
      additionalProperties: false
    PageListAllFrameIdsResult:
      type: object
      properties:
        frameIds:
          type: array
          items:
            $ref: "#/components/schemas/FrameId"
      required:
        - frameIds
      additionalProperties: false
    PageTitleResult:
      type: object
      properties:
        title:
          type: string
      required:
        - title
      additionalProperties: false
    PageUrlResult:
      type: object
      properties:
        url:
          type: string
      required:
        - url
      additionalProperties: false
    PageScreenshotResult:
      type: object
      properties:
        base64:
          type: string
        mimeType:
          $ref: "#/components/schemas/ScreenshotMimeType"
      required:
        - base64
        - mimeType
      additionalProperties: false
    PageSnapshotResult:
      type: object
      properties:
        formattedTree:
          type: string
        xpathMap:
          type: object
          properties: {}
          additionalProperties:
            type: string
        urlMap:
          type: object
          properties: {}
          additionalProperties:
            type: string
      required:
        - formattedTree
        - xpathMap
        - urlMap
      additionalProperties: false
    PageFramesResult:
      type: object
      properties:
        frames:
          type: array
          items:
            $ref: "#/components/schemas/PageFrame"
      required:
        - frames
      additionalProperties: false
    PageFrame:
      type: object
      properties:
        frameId:
          $ref: "#/components/schemas/FrameId"
        pageId:
          $ref: "#/components/schemas/PageId"
        sessionId:
          anyOf:
            - $ref: "#/components/schemas/CDPSessionId"
            - type: "null"
        isBrowserRemote:
          type: boolean
      required:
        - frameId
        - pageId
        - sessionId
        - isBrowserRemote
      additionalProperties: false
    PageSetViewportSizeResult:
      type: object
      properties:
        width:
          type: number
          exclusiveMinimum: 0
        height:
          type: number
          exclusiveMinimum: 0
        deviceScaleFactor:
          type: number
          exclusiveMinimum: 0
      required:
        - width
        - height
      additionalProperties: false
    PageSetExtraHTTPHeadersResult:
      type: object
      properties:
        headers:
          $ref: "#/components/schemas/PageHeaders"
      required:
        - headers
      additionalProperties: false
    PageWaitForLoadStateResult:
      type: object
      properties:
        state:
          $ref: "#/components/schemas/LoadState"
      required:
        - state
      additionalProperties: false
    PageWaitForSelectorResult:
      type: object
      properties:
        selector:
          $ref: "#/components/schemas/ElementSelector"
        matched:
          type: boolean
      required:
        - selector
        - matched
      additionalProperties: false
    PageWaitForTimeoutResult:
      type: object
      properties:
        ms:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - ms
      additionalProperties: false
    PageEvaluateResult:
      type: object
      properties:
        value: {}
      required:
        - value
      additionalProperties: false
    PageSendCDPResult:
      type: object
      properties:
        value: {}
      required:
        - value
      additionalProperties: false
    PageCloseResult:
      type: object
      properties:
        closed:
          type: boolean
      required:
        - closed
      additionalProperties: false
    LocalBrowserLaunchOptions:
      type: object
      properties:
        args:
          type: array
          items:
            type: string
        executablePath:
          type: string
        port:
          type: number
        userDataDir:
          type: string
        preserveUserDataDir:
          type: boolean
        headless:
          type: boolean
        devtools:
          type: boolean
        chromiumSandbox:
          type: boolean
        ignoreDefaultArgs:
          anyOf:
            - type: boolean
            - type: array
              items:
                type: string
        proxy:
          type: object
          properties:
            server:
              type: string
            bypass:
              type: string
            username:
              type: string
            password:
              type: string
          required:
            - server
        locale:
          type: string
        viewport:
          type: object
          properties:
            width:
              type: number
            height:
              type: number
          required:
            - width
            - height
        deviceScaleFactor:
          type: number
        hasTouch:
          type: boolean
        ignoreHTTPSErrors:
          type: boolean
        cdpUrl:
          type: string
        cdpHeaders:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: string
        connectTimeoutMs:
          type: number
        downloadsPath:
          type: string
        acceptDownloads:
          type: boolean
      additionalProperties: false
    BrowserbaseSessionCreateParams:
      type: object
      properties:
        projectId:
          deprecated: true
          description: Deprecated. Browserbase API keys are now project-scoped, so this
            field is no longer required.
          type: string
        browserSettings:
          $ref: "#/components/schemas/BrowserbaseBrowserSettings"
        extensionId:
          type: string
        keepAlive:
          type: boolean
        proxies:
          anyOf:
            - type: boolean
            - type: array
              items:
                $ref: "#/components/schemas/ProxyConfig"
        region:
          $ref: "#/components/schemas/BrowserbaseRegion"
        timeout:
          type: number
        userMetadata:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
    BrowserSessionId:
      example: session_01JXAMPLE
      type: string
      minLength: 1
    BrowserSessionEnv:
      type: string
      enum:
        - LOCAL
        - BROWSERBASE
    BrowserSessionStatus:
      type: string
      enum:
        - running
        - ended
    BrowserSessionCreateRequest:
      oneOf:
        - $ref: "#/components/schemas/BrowserSessionLocalCreateRequest"
        - $ref: "#/components/schemas/BrowserSessionBrowserbaseCreateRequest"
      type: object
      discriminator:
        propertyName: env
        mapping:
          LOCAL: "#/components/schemas/BrowserSessionLocalCreateRequest"
          BROWSERBASE: "#/components/schemas/BrowserSessionBrowserbaseCreateRequest"
    BrowserSessionEndRequest:
      type: object
      properties: {}
      additionalProperties: false
    BrowserSessionUpdateRequest:
      type: object
      properties:
        domSettleTimeoutMs:
          type: number
        verbose:
          anyOf:
            - type: number
              const: 0
            - type: number
              const: 1
            - type: number
              const: 2
        selfHeal:
          type: boolean
        waitForCaptchaSolves:
          type: boolean
        experimental:
          type: boolean
        actTimeoutMs:
          type: number
        llmId:
          $ref: "#/components/schemas/LLMId"
        actLlmId:
          anyOf:
            - $ref: "#/components/schemas/LLMId"
            - type: "null"
        observeLlmId:
          anyOf:
            - $ref: "#/components/schemas/LLMId"
            - type: "null"
        extractLlmId:
          anyOf:
            - $ref: "#/components/schemas/LLMId"
            - type: "null"
      additionalProperties: false
    BrowserSession:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/BrowserSessionId"
        env:
          $ref: "#/components/schemas/BrowserSessionEnv"
        status:
          $ref: "#/components/schemas/BrowserSessionStatus"
        cdpUrl:
          anyOf:
            - type: string
            - type: "null"
        available:
          type: boolean
        browserbaseSessionId:
          type: string
        browserbaseSessionCreateParams:
          $ref: "#/components/schemas/BrowserbaseSessionCreateParams"
        localBrowserLaunchOptions:
          $ref: "#/components/schemas/LocalBrowserLaunchOptions"
        domSettleTimeoutMs:
          type: number
        verbose:
          anyOf:
            - type: number
              const: 0
            - type: number
              const: 1
            - type: number
              const: 2
        selfHeal:
          type: boolean
        waitForCaptchaSolves:
          type: boolean
        experimental:
          type: boolean
        actTimeoutMs:
          type: number
        llmId:
          $ref: "#/components/schemas/LLMId"
        actLlmId:
          anyOf:
            - $ref: "#/components/schemas/LLMId"
            - type: "null"
        observeLlmId:
          anyOf:
            - $ref: "#/components/schemas/LLMId"
            - type: "null"
        extractLlmId:
          anyOf:
            - $ref: "#/components/schemas/LLMId"
            - type: "null"
      required:
        - id
        - env
        - status
        - available
        - llmId
        - actLlmId
        - observeLlmId
        - extractLlmId
      additionalProperties: false
    BrowserSessionResult:
      type: object
      properties:
        browserSession:
          $ref: "#/components/schemas/BrowserSession"
      required:
        - browserSession
      additionalProperties: false
    BrowserSessionActionMethod:
      type: string
      enum:
        - addInitScript
        - setExtraHTTPHeaders
        - pages
        - activePage
        - awaitActivePage
        - resolvePageByMainFrameId
        - getFullFrameTreeByMainFrameId
        - newPage
        - cookies
        - addCookies
        - clearCookies
        - connectURL
        - configuredViewport
        - browserbaseSessionID
        - browserbaseSessionURL
        - browserbaseDebugURL
        - isBrowserbase
        - isAdvancedStealth
        - setViewportSize
        - close
    BrowserSessionActionStatus:
      type: string
      enum:
        - queued
        - running
        - completed
        - failed
        - canceled
    BrowserSessionPage:
      type: object
      properties:
        pageId:
          $ref: "#/components/schemas/PageId"
        targetId:
          $ref: "#/components/schemas/PageId"
        mainFrameId:
          $ref: "#/components/schemas/FrameId"
        url:
          type: string
      required:
        - pageId
        - targetId
        - mainFrameId
        - url
      additionalProperties: false
    BrowserSessionCookie:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        domain:
          type: string
        path:
          type: string
        expires:
          type: number
        httpOnly:
          type: boolean
        secure:
          type: boolean
        sameSite:
          type: string
          enum:
            - Strict
            - Lax
            - None
      required:
        - name
        - value
        - domain
        - path
        - expires
        - httpOnly
        - secure
        - sameSite
      additionalProperties: false
    BrowserSessionCookieParam:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        url:
          type: string
        domain:
          type: string
        path:
          type: string
        expires:
          type: number
        httpOnly:
          type: boolean
        secure:
          type: boolean
        sameSite:
          type: string
          enum:
            - Strict
            - Lax
            - None
      required:
        - name
        - value
      additionalProperties: false
    BrowserSessionRegex:
      type: object
      properties:
        source:
          type: string
        flags:
          type: string
      required:
        - source
      additionalProperties: false
    BrowserSessionStringPattern:
      anyOf:
        - type: string
        - $ref: "#/components/schemas/BrowserSessionRegex"
    BrowserSessionClearCookiesOptions:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/BrowserSessionStringPattern"
        domain:
          $ref: "#/components/schemas/BrowserSessionStringPattern"
        path:
          $ref: "#/components/schemas/BrowserSessionStringPattern"
      additionalProperties: false
    BrowserSessionViewport:
      type: object
      properties:
        width:
          type: number
          exclusiveMinimum: 0
        height:
          type: number
          exclusiveMinimum: 0
        deviceScaleFactor:
          type: number
          exclusiveMinimum: 0
      required:
        - width
        - height
      additionalProperties: false
    BrowserSessionAddInitScriptParams:
      type: object
      properties:
        script:
          $ref: "#/components/schemas/PageInitScript"
      required:
        - script
      additionalProperties: false
    BrowserSessionSetExtraHTTPHeadersParams:
      type: object
